services:
  backend:
    build: .
    container_name: securehr-backend
    working_dir: /app/backend
    command: node server.js
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=securehr_secret_key

  frontend:
    build: .
    container_name: securehr-frontend
    working_dir: /app/frontend
    command: sh -c "HOST=0.0.0.0 npm start"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
    depends_on:
      - backend